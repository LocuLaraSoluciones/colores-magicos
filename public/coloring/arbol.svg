  <path d="M160,197 Q162,190 165,192" fill="none" stroke="#111" stroke-width="1.5"/>
  <circle class="region" data-name="manzana2" cx="240" cy="220" r="14" fill="white" stroke="#111" stroke-width="2"/>
  <path d="M240,207 Q242,200 245,202" fill="none" stroke="#111" stroke-width="1.5"/>
  <circle class="region" data-name="manzana3" cx="200" cy="175" r="14" fill="white" stroke="#111" stroke-width="2"/>
