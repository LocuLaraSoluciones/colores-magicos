  <circle class="region" data-name="pajaro-cabeza" cx="278" cy="250" r="9" fill="white" stroke="#111" stroke-width="1.5"/>
  <path class="region" data-name="pajaro-ala" d="M260,250 Q255,238 262,242Z" fill="white" stroke="#111" stroke-width="1.5"/>
