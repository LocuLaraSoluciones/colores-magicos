  <rect class="region" data-name="torr-cen-alm2" x="178" y="155" width="20" height="28" rx="2" fill="white" stroke="#111" stroke-width="2"/>
  <rect class="region" data-name="torr-cen-alm3" x="208" y="155" width="20" height="28" rx="2" fill="white" stroke="#111" stroke-width="2"/>
  <rect class="region" data-name="torr-cen-alm4" x="232" y="155" width="20" height="28" rx="2" fill="white" stroke="#111" stroke-width="2"/>
