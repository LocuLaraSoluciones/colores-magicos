  <rect class="region" data-name="torr-der-alm2" x="292" y="200" width="18" height="28" rx="2" fill="white" stroke="#111" stroke-width="2"/>
  <rect class="region" data-name="torr-der-alm3" x="319" y="200" width="18" height="28" rx="2" fill="white" stroke="#111" stroke-width="2"/>
