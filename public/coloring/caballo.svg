  <rect class="region" data-name="cielo" x="0" y="0" width="400" height="310" fill="white" stroke="#111" stroke-width="1.5"/>
  <!-- Sun -->
  <circle class="region" data-name="sol" cx="60" cy="55" r="32" fill="white" stroke="#111" stroke-width="2"/>
  <line x1="60" y1="12" x2="60" y2="2" stroke="#111" stroke-width="2"/>
  <line x1="60" y1="98" x2="60" y2="108" stroke="#111" stroke-width="2"/>
  <line x1="17" y1="55" x2="7" y2="55" stroke="#111" stroke-width="2"/>
  <line x1="103" y1="55" x2="113" y2="55" stroke="#111" stroke-width="2"/>
  <line x1="29" y1="24" x2="22" y2="17" stroke="#111" stroke-width="2"/>
  <line x1="91" y1="86" x2="98" y2="93" stroke="#111" stroke-width="2"/>
  <line x1="91" y1="24" x2="98" y2="17" stroke="#111" stroke-width="2"/>
  <line x1="29" y1="86" x2="22" y2="93" stroke="#111" stroke-width="2"/>
  <!-- Hills -->
  <path class="region" data-name="colina-izq" d="M0,310 Q100,200 200,310Z" fill="white" stroke="#111" stroke-width="2"/>
  <path class="region" data-name="colina-der" d="M200,310 Q300,200 400,310Z" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Ground -->
  <rect class="region" data-name="pasto" x="0" y="390" width="400" height="110" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Fence posts -->
  <rect x="20" y="370" width="8" height="35" fill="white" stroke="#111" stroke-width="1.5"/>
  <rect x="55" y="370" width="8" height="35" fill="white" stroke="#111" stroke-width="1.5"/>
  <line x1="20" y1="378" x2="63" y2="378" stroke="#111" stroke-width="1.5"/>
  <line x1="20" y1="390" x2="63" y2="390" stroke="#111" stroke-width="1.5"/>
  <rect x="330" y="370" width="8" height="35" fill="white" stroke="#111" stroke-width="1.5"/>
  <rect x="365" y="370" width="8" height="35" fill="white" stroke="#111" stroke-width="1.5"/>
  <line x1="330" y1="378" x2="373" y2="378" stroke="#111" stroke-width="1.5"/>
  <line x1="330" y1="390" x2="373" y2="390" stroke="#111" stroke-width="1.5"/>
  <!-- Horse body -->
  <ellipse class="region" data-name="cuerpo" cx="200" cy="320" rx="105" ry="70" fill="white" stroke="#111" stroke-width="2.5"/>
