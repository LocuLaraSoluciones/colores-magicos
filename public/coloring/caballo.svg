  <rect class="region" data-name="pata-ant-izq" x="118" y="370" width="30" height="68" rx="8" fill="white" stroke="#111" stroke-width="2"/>
  <rect class="region" data-name="pata-ant-der" x="160" y="370" width="30" height="68" rx="8" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Legs back -->
  <rect class="region" data-name="pata-tras-izq" x="218" y="375" width="30" height="63" rx="8" fill="white" stroke="#111" stroke-width="2"/>
  <rect class="region" data-name="pata-tras-der" x="258" y="375" width="30" height="63" rx="8" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Hooves -->
  <ellipse class="region" data-name="casco1" cx="133" cy="440" rx="18" ry="9" fill="white" stroke="#111" stroke-width="2"/>
  <ellipse class="region" data-name="casco2" cx="175" cy="440" rx="18" ry="9" fill="white" stroke="#111" stroke-width="2"/>
  <ellipse class="region" data-name="casco3" cx="233" cy="440" rx="18" ry="9" fill="white" stroke="#111" stroke-width="2"/>
  <ellipse class="region" data-name="casco4" cx="273" cy="440" rx="18" ry="9" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Tail -->
  <path class="region" data-name="cola-1" d="M305,300 Q340,285 342,315 Q328,325 305,318Z" fill="white" stroke="#111" stroke-width="2"/>
  <path class="region" data-name="cola-2" d="M307,316 Q345,308 346,348 Q332,352 308,335Z" fill="white" stroke="#111" stroke-width="2"/>
  <path class="region" data-name="cola-3" d="M308,338 Q342,342 338,378 Q324,380 310,358Z" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Title -->
  <text x="200" y="492" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#111">🐴 Caballo 🐴</text>
</svg>
