  <path class="region" data-name="crin-1" d="M178,175 Q200,168 205,190 Q195,188 185,183Z" fill="white" stroke="#111" stroke-width="1.8"/>
  <path class="region" data-name="crin-2" d="M175,188 Q200,182 202,205 Q192,202 180,197Z" fill="white" stroke="#111" stroke-width="1.8"/>
  <path class="region" data-name="crin-3" d="M172,202 Q197,198 196,222 Q186,218 174,213Z" fill="white" stroke="#111" stroke-width="1.8"/>
  <path class="region" data-name="crin-4" d="M168,218 Q192,216 188,240 Q178,235 168,228Z" fill="white" stroke="#111" stroke-width="1.8"/>
