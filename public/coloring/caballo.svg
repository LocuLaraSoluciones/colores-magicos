  <ellipse class="region" data-name="cabeza" cx="162" cy="205" rx="42" ry="36" fill="white" stroke="#111" stroke-width="2.5"/>
  <!-- Snout -->
  <ellipse class="region" data-name="hocico" cx="130" cy="215" rx="25" ry="18" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Nostril -->
  <ellipse cx="120" cy="218" rx="5" ry="4" fill="#ddd" stroke="#111" stroke-width="1.5"/>
  <ellipse cx="134" cy="220" rx="5" ry="4" fill="#ddd" stroke="#111" stroke-width="1.5"/>
  <!-- Mouth -->
  <path d="M114,224 Q122,230 132,226" fill="none" stroke="#111" stroke-width="1.5"/>
  <!-- Eye -->
  <ellipse class="region" data-name="ojo" cx="170" cy="198" rx="11" ry="12" fill="white" stroke="#111" stroke-width="2"/>
  <ellipse cx="170" cy="199" rx="6" ry="7" fill="#111"/>
  <ellipse cx="167" cy="196" rx="2" ry="2" fill="white"/>
