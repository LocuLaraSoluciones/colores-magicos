<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <rect width="400" height="500" fill="white"/>
  <!-- Sky background -->
  <rect class="region" data-name="cielo" x="0" y="0" width="400" height="200" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Stars -->
  <polygon class="region" data-name="estrella1" points="60,30 65,45 80,45 68,54 73,70 60,61 47,70 52,54 40,45 55,45" fill="white" stroke="#111" stroke-width="1.5"/>
  <polygon class="region" data-name="estrella2" points="320,20 324,32 337,32 327,39 331,52 320,45 309,52 313,39 303,32 316,32" fill="white" stroke="#111" stroke-width="1.5"/>
  <polygon class="region" data-name="estrella3" points="180,15 183,24 193,24 185,30 188,40 180,34 172,40 175,30 167,24 177,24" fill="white" stroke="#111" stroke-width="1.5"/>
  <!-- Moon -->
  <path class="region" data-name="luna" d="M340,60 Q360,40 370,70 Q350,90 330,80 Q335,70 340,60Z" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Ground -->
  <rect class="region" data-name="pasto" x="0" y="380" width="400" height="120" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Flowers on ground -->
  <circle class="region" data-name="flor1-centro" cx="50" cy="400" r="8" fill="white" stroke="#111" stroke-width="1.5"/>
  <ellipse class="region" data-name="flor1-petalo1" cx="50" cy="388" rx="5" ry="8" fill="white" stroke="#111" stroke-width="1.5"/>
  <ellipse class="region" data-name="flor1-petalo2" cx="50" cy="412" rx="5" ry="8" fill="white" stroke="#111" stroke-width="1.5"/>
  <ellipse class="region" data-name="flor1-petalo3" cx="38" cy="400" rx="8" ry="5" fill="white" stroke="#111" stroke-width="1.5"/>
  <ellipse class="region" data-name="flor1-petalo4" cx="62" cy="400" rx="8" ry="5" fill="white" stroke="#111" stroke-width="1.5"/>
  <circle class="region" data-name="flor2-centro" cx="350" cy="395" r="8" fill="white" stroke="#111" stroke-width="1.5"/>
  <ellipse class="region" data-name="flor2-petalo1" cx="350" cy="383" rx="5" ry="8" fill="white" stroke="#111" stroke-width="1.5"/>
  <ellipse class="region" data-name="flor2-petalo2" cx="350" cy="407" rx="5" ry="8" fill="white" stroke="#111" stroke-width="1.5"/>
  <ellipse class="region" data-name="flor2-petalo3" cx="338" cy="395" rx="8" ry="5" fill="white" stroke="#111" stroke-width="1.5"/>
  <ellipse class="region" data-name="flor2-petalo4" cx="362" cy="395" rx="8" ry="5" fill="white" stroke="#111" stroke-width="1.5"/>
  <!-- Princess dress - big skirt -->
  <path class="region" data-name="vestido-falda" d="M200,280 L120,460 L280,460 Z" fill="white" stroke="#111" stroke-width="2.5"/>
  <!-- Dress bodice -->
  <path class="region" data-name="vestido-cuerpo" d="M175,200 Q200,210 225,200 L235,280 L165,280 Z" fill="white" stroke="#111" stroke-width="2.5"/>
  <!-- Dress collar/neckline decoration -->
  <path class="region" data-name="vestido-escote" d="M183,200 Q200,218 217,200 Q210,195 200,193 Q190,195 183,200Z" fill="white" stroke="#111" stroke-width="1.5"/>
  <!-- Sleeves -->
  <path class="region" data-name="manga-izq" d="M175,200 Q145,210 140,240 Q155,245 165,235 L175,215Z" fill="white" stroke="#111" stroke-width="2"/>
  <path class="region" data-name="manga-der" d="M225,200 Q255,210 260,240 Q245,245 235,235 L225,215Z" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Belt/sash -->
  <rect class="region" data-name="cinto" x="168" y="272" width="64" height="16" rx="4" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Crown -->
  <path class="region" data-name="corona" d="M170,130 L175,110 L185,125 L200,105 L215,125 L225,110 L230,130 Z" fill="white" stroke="#111" stroke-width="2.5"/>
  <!-- Crown gems -->
  <circle class="region" data-name="gema-corona1" cx="185" cy="120" r="5" fill="white" stroke="#111" stroke-width="1.5"/>
  <circle class="region" data-name="gema-corona2" cx="200" cy="112" r="6" fill="white" stroke="#111" stroke-width="1.5"/>
  <circle class="region" data-name="gema-corona3" cx="215" cy="120" r="5" fill="white" stroke="#111" stroke-width="1.5"/>
  <!-- Head -->
  <ellipse class="region" data-name="cara" cx="200" cy="160" rx="38" ry="42" fill="white" stroke="#111" stroke-width="2.5"/>
  <!-- Hair top -->
  <path class="region" data-name="cabello-arriba" d="M162,150 Q165,118 200,115 Q235,118 238,150 Q220,130 200,132 Q180,130 162,150Z" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Hair sides -->
  <path class="region" data-name="cabello-lado-izq" d="M162,150 Q148,170 150,200 Q160,195 168,180 L165,160Z" fill="white" stroke="#111" stroke-width="2"/>
  <path class="region" data-name="cabello-lado-der" d="M238,150 Q252,170 250,200 Q240,195 232,180 L235,160Z" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Eyes -->
  <ellipse class="region" data-name="ojo-izq" cx="186" cy="158" rx="9" ry="10" fill="white" stroke="#111" stroke-width="2"/>
  <ellipse class="region" data-name="pupila-izq" cx="186" cy="159" rx="5" ry="6" fill="#111" stroke="none"/>
  <ellipse class="region" data-name="ojo-der" cx="214" cy="158" rx="9" ry="10" fill="white" stroke="#111" stroke-width="2"/>
  <ellipse class="region" data-name="pupila-der" cx="214" cy="159" rx="5" ry="6" fill="#111" stroke="none"/>
  <!-- Nose -->
  <path d="M198,168 Q200,175 202,168" fill="none" stroke="#111" stroke-width="1.5"/>
  <!-- Mouth -->
  <path class="region" data-name="boca" d="M190,180 Q200,190 210,180" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Cheeks blush -->
  <ellipse class="region" data-name="mejilla-izq" cx="175" cy="172" rx="10" ry="6" fill="white" stroke="#111" stroke-width="1" stroke-dasharray="3,2"/>
  <ellipse class="region" data-name="mejilla-der" cx="225" cy="172" rx="10" ry="6" fill="white" stroke="#111" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Wand -->
  <line x1="260" y1="240" x2="310" y2="160" stroke="#111" stroke-width="2.5"/>
  <polygon class="region" data-name="varita-estrella" points="310,140 315,155 330,155 318,164 323,180 310,171 297,180 302,164 290,155 305,155" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Shoes -->
  <ellipse class="region" data-name="zapato-izq" cx="165" cy="462" rx="22" ry="10" fill="white" stroke="#111" stroke-width="2"/>
  <ellipse class="region" data-name="zapato-der" cx="235" cy="462" rx="22" ry="10" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Title -->
  <text x="200" y="495" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#111">🌸 Princesa 🌸</text>
</svg>
