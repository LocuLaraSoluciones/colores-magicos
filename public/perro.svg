<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <rect width="400" height="500" fill="white"/>
  <!-- Background -->
  <rect class="region" data-name="fondo" x="0" y="0" width="400" height="400" fill="white" stroke="#111" stroke-width="1.5"/>
  <!-- Ground -->
  <rect class="region" data-name="pasto" x="0" y="390" width="400" height="110" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Clouds -->
  <path class="region" data-name="nube1" d="M30,55 Q42,40 58,47 Q65,30 82,37 Q90,25 105,37 Q118,31 120,50 Q132,53 128,67 Q28,72 24,61Z" fill="white" stroke="#111" stroke-width="2"/>
  <path class="region" data-name="nube2" d="M290,40 Q302,25 318,32 Q325,15 342,22 Q352,12 368,24 Q378,19 380,38 Q390,41 386,55 Q288,60 284,49Z" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Dog house -->
  <rect class="region" data-name="casita-cuerpo" x="30" y="310" width="100" height="80" fill="white" stroke="#111" stroke-width="2"/>
  <path class="region" data-name="casita-techo" d="M22,315 L80,265 L138,315Z" fill="white" stroke="#111" stroke-width="2"/>
  <path class="region" data-name="casita-puerta" d="M60,390 L60,345 Q80,330 100,345 L100,390Z" fill="white" stroke="#111" stroke-width="2"/>
  <text x="80" y="300" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#111">REX</text>
  <!-- Bone -->
  <ellipse class="region" data-name="hueso-izq1" cx="308" cy="378" rx="10" ry="7" fill="white" stroke="#111" stroke-width="1.8"/>
  <rect class="region" data-name="hueso-palo" x="316" y="374" width="26" height="8" rx="2" fill="white" stroke="#111" stroke-width="1.8"/>
  <ellipse class="region" data-name="hueso-der1" cx="352" cy="378" rx="10" ry="7" fill="white" stroke="#111" stroke-width="1.8"/>
  <!-- Dog body -->
  <ellipse class="region" data-name="cuerpo" cx="210" cy="330" rx="90" ry="65" fill="white" stroke="#111" stroke-width="2.5"/>
  <!-- Neck -->
  <path class="region" data-name="cuello" d="M178,280 Q188,255 215,252 Q232,255 235,278 Q215,268 178,280Z" fill="white" stroke="#111" stroke-width="2.5"/>
  <!-- Collar -->
  <path class="region" data-name="collar" d="M178,282 Q207,272 236,282 Q234,292 207,295 Q180,292 178,282Z" fill="white" stroke="#111" stroke-width="2"/>
  <circle class="region" data-name="collar-tag" cx="207" cy="296" r="8" fill="white" stroke="#111" stroke-width="1.5"/>
  <!-- Head -->
  <ellipse class="region" data-name="cabeza" cx="207" cy="228" rx="52" ry="48" fill="white" stroke="#111" stroke-width="2.5"/>
  <!-- Ears (floppy) -->
  <path class="region" data-name="oreja-izq" d="M158,200 Q138,185 135,225 Q142,240 162,235 Q155,220 158,200Z" fill="white" stroke="#111" stroke-width="2"/>
  <path class="region" data-name="oreja-der" d="M256,200 Q276,185 279,225 Q272,240 252,235 Q259,220 256,200Z" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Snout -->
  <ellipse class="region" data-name="hocico" cx="207" cy="245" rx="32" ry="24" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Nose -->
  <ellipse class="region" data-name="nariz" cx="207" cy="235" rx="16" ry="11" fill="white" stroke="#111" stroke-width="2"/>
  <ellipse cx="207" cy="235" rx="12" ry="8" fill="#111"/>
  <ellipse cx="202" cy="232" rx="3" ry="2" fill="white"/>
  <!-- Mouth -->
  <path d="M200,250 Q207,260 214,250" fill="none" stroke="#111" stroke-width="2"/>
  <line x1="207" y1="250" x2="207" y2="258" stroke="#111" stroke-width="1.5"/>
  <!-- Tongue -->
  <path class="region" data-name="lengua" d="M200,256 Q207,270 214,256 Q210,265 207,267 Q204,265 200,256Z" fill="white" stroke="#111" stroke-width="1.5"/>
  <!-- Eyes -->
  <ellipse class="region" data-name="ojo-izq" cx="188" cy="218" rx="14" ry="15" fill="white" stroke="#111" stroke-width="2"/>
  <ellipse cx="188" cy="219" rx="8" ry="9" fill="#111"/>
  <ellipse cx="184" cy="215" rx="3" ry="3" fill="white"/>
  <ellipse class="region" data-name="ojo-der" cx="226" cy="218" rx="14" ry="15" fill="white" stroke="#111" stroke-width="2"/>
  <ellipse cx="226" cy="219" rx="8" ry="9" fill="#111"/>
  <ellipse cx="222" cy="215" rx="3" ry="3" fill="white"/>
  <!-- Eyebrows -->
  <path d="M177,207 Q188,202 200,207" fill="none" stroke="#111" stroke-width="2"/>
  <path d="M214,207 Q226,202 237,207" fill="none" stroke="#111" stroke-width="2"/>
  <!-- Legs -->
  <rect class="region" data-name="pata-ant-izq" x="148" y="375" width="32" height="55" rx="10" fill="white" stroke="#111" stroke-width="2"/>
  <rect class="region" data-name="pata-ant-der" x="190" y="375" width="32" height="55" rx="10" fill="white" stroke="#111" stroke-width="2"/>
  <rect class="region" data-name="pata-tras-izq" cx="232" y="378" width="32" height="52" rx="10" fill="white" stroke="#111" stroke-width="2"/>
  <rect class="region" data-name="pata-tras-der" x="272" y="378" width="32" height="52" rx="10" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Paws -->
  <ellipse class="region" data-name="pata-izq-pie" cx="164" cy="432" rx="20" ry="10" fill="white" stroke="#111" stroke-width="2"/>
  <ellipse class="region" data-name="pata-der-pie" cx="206" cy="432" rx="20" ry="10" fill="white" stroke="#111" stroke-width="2"/>
  <ellipse class="region" data-name="pata-ti-pie" cx="248" cy="432" rx="20" ry="10" fill="white" stroke="#111" stroke-width="2"/>
  <ellipse class="region" data-name="pata-td-pie" cx="288" cy="432" rx="20" ry="10" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Tail wagging -->
  <path class="region" data-name="cola" d="M300,305 Q335,280 348,300 Q355,320 330,330 Q320,315 300,318Z" fill="white" stroke="#111" stroke-width="2"/>
  <!-- Spots on body -->
  <ellipse class="region" data-name="mancha1" cx="185" cy="340" rx="22" ry="18" fill="white" stroke="#111" stroke-width="1.5" stroke-dasharray="4,3"/>
  <ellipse class="region" data-name="mancha2" cx="240" cy="320" rx="18" ry="14" fill="white" stroke="#111" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Title -->
  <text x="200" y="492" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#111">🐶 Perro 🐶</text>
</svg>
